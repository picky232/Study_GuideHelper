name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontEnd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackEnd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: BackEnd/package-lock.json
      - run: npm ci
      - name: Syntax check API routes
        run: node --check api/auth/signup.js && node --check api/auth/login.js
      - name: Import check domain/infrastructure layers
        env:
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy
        run: |
          node --input-type=module -e "
            import './src/infrastructure/auth/SupabaseAuthRepository.js'
            console.log('backend modules load OK')
          "
